name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Show import fix diff (debug)
        working-directory: backend
        run: ruff check . --select I --diff || true
      - name: Lint
        working-directory: backend
        run: ruff check .
      - name: Format diff (debug)
        working-directory: backend
        run: ruff format --diff . || true
      - name: Format check
        working-directory: backend
        run: ruff format --check .

  backend-test:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install ".[dev]"
      - name: Run tests
        working-directory: backend
        env:
          HA_URL: "http://localhost:8123"
          HA_TOKEN: "test-token-for-ci"
        run: |
          source .venv/bin/activate
          pytest tests/ -v

  frontend-lint:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run Next.js lint
        working-directory: frontend
        run: npm run lint

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t lg-hue-backend ./backend
      - run: docker build -t lg-hue-frontend ./frontend
